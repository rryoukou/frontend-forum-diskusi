<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 620" width="400" height="620">
  <defs>
    <!-- Subtle outer glow for neon aesthetic effect -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="400" height="620" fill="#000000"/>

  <!-- Main logo group -->
  <g fill="#00E676" filter="url(#neonGlow)">

    <!-- ================================================ -->
    <!--  BOTTOM LEFT LEAF                                 -->
    <!--  Elongated crescent, pointing down-left           -->
    <!-- ================================================ -->
    <path d="
      M 200,565
      C 196,545 170,490 148,445
      C 126,400 112,365 112,338
      C 112,318 120,305 135,300
      C 148,296 158,305 162,318
      C 166,335 182,435 200,565
      Z
    "/>

    <!-- ================================================ -->
    <!--  BOTTOM RIGHT LEAF                                -->
    <!--  Mirror of left leaf                              -->
    <!-- ================================================ -->
    <path d="
      M 200,565
      C 204,545 230,490 252,445
      C 274,400 288,365 288,338
      C 288,318 280,305 265,300
      C 252,296 242,305 238,318
      C 234,335 218,435 200,565
      Z
    "/>

    <!-- ================================================ -->
    <!--  SPIRAL / SWIRL - Main body                       -->
    <!--  Complex spiral wrapping ~1.5 turns               -->
    <!--  Constructed as outer edge + inner edge            -->
    <!-- ================================================ -->
    <path d="
      M 135,300
      C 110,268 95,225 105,185
      C 115,145 145,118 185,108
      C 225,98 265,110 292,140
      C 319,170 325,212 312,250
      C 299,288 272,315 238,325
      C 205,335 180,322 172,300
      C 164,278 172,258 190,248
      C 208,238 228,245 235,260
      C 240,272 235,285 224,290

      L 220,280
      C 228,276 232,266 228,256
      C 224,245 210,240 198,246
      C 184,254 178,272 182,290
      C 188,312 210,328 240,320
      C 268,312 290,288 298,258
      C 308,225 302,190 282,162
      C 262,134 232,118 200,118
      C 165,118 138,142 128,178
      C 118,215 125,258 145,290
      C 150,298 155,305 155,310

      C 148,308 140,304 135,300
      Z
    "/>

    <!-- ================================================ -->
    <!--  TOP LEFT FLAME                                   -->
    <!--  Curves upward-left from the spiral               -->
    <!-- ================================================ -->
    <path d="
      M 105,185
      C 95,155 82,118 85,82
      C 88,55 96,40 105,42
      C 112,45 118,62 120,85
      C 124,118 125,155 128,185
      Z
    "/>

    <!-- ================================================ -->
    <!--  TOP CENTER FLAME (tallest)                       -->
    <!--  Rises straight up as the dominant element        -->
    <!-- ================================================ -->
    <path d="
      M 185,112
      C 185,85 188,55 186,32
      C 184,15 180,5 176,8
      C 170,14 168,42 168,72
      C 168,95 170,110 174,118
      Z
    "/>

    <!-- ================================================ -->
    <!--  TOP RIGHT FLAME                                  -->
    <!--  Curves upward-right, slightly shorter            -->
    <!-- ================================================ -->
    <path d="
      M 282,148
      C 292,118 308,85 305,52
      C 303,35 296,25 290,28
      C 282,32 275,58 272,88
      C 268,118 268,140 270,152
      Z
    "/>

  </g>
</svg>
